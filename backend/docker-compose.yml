services:
  redis:
    image: redis:7-alpine
    container_name: syntrak-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  main-backend:
    build:
      context: ./main-backend
      dockerfile: Dockerfile
    container_name: syntrak-main-backend
    env_file:
      - ./main-backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped

  community-backend:
    build:
      context: ./community-backend
      dockerfile: Dockerfile
    container_name: syntrak-community-backend
    env_file:
      - ./community-backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - FASTAPI_ENV=production
      - HOST=0.0.0.0
      - PORT=5001
    ports:
      - "5001:5001"
    restart: unless-stopped

  activity-backend:
    build:
      context: ./activity-backend
      dockerfile: Dockerfile
    container_name: syntrak-activity-backend
    env_file:
      - ./activity-backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - FASTAPI_ENV=production
      - HOST=0.0.0.0
      - PORT=5100
    ports:
      - "5100:5100"
    restart: unless-stopped

  map-backend:
    build:
      context: .
      dockerfile: ./map-backend/Dockerfile
    container_name: syntrak-map-backend
    env_file:
      - ./map-backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - FASTAPI_ENV=production
      - HOST=0.0.0.0
      - PORT=5200
      - RATE_LIMIT_REDIS_URL=redis://redis:6379/0
    ports:
      - "5200:5200"
    depends_on:
      - redis
    restart: unless-stopped