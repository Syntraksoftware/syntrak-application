services:
  redis:
    extends:
      file: ./backend/docker-compose.yml
      service: redis

  main-backend:
    extends:
      file: ./backend/docker-compose.yml
      service: main-backend

  community-backend:
    extends:
      file: ./backend/docker-compose.yml
      service: community-backend

  activity-backend:
    extends:
      file: ./backend/docker-compose.yml
      service: activity-backend

  map-backend:
    extends:
      file: ./backend/docker-compose.yml
      service: map-backend

  frontend-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: syntrak-frontend-web
    ports:
      - "8088:80"
    depends_on:
      - redis
      - main-backend
      - community-backend
      - activity-backend
      - map-backend
    profiles:
      - web
