name: syntrak
description: All in one ski tracking and social app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  get_it: ^7.7.0
  riverpod: ^2.5.0

  # Networking
  http: ^1.1.0
  dio: ^5.4.0

  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # Maps & geo
  # Raster/vector map widgets (MapLibre GL)
  # 0.25+ needs Dart >=3.5; ^0.20 stays compatible with sdk: '>=3.0.0'
  maplibre_gl: ^0.20.0
  # Google Maps integration
  google_maps_flutter: ^2.5.0
  # Encode/decode polylines for routes on the map
  flutter_polyline_points: ^2.0.0
  # Lat/lng math (distance, bearing, bounds)
  latlong2: ^0.9.1
  # GPS smoothing/filtering: implemented in `lib/services/gps_filter_service.dart` (no pub package).

  # FIT import: pub.dev `fit_parser` is Dart 2 only (sdk <3). Use e.g. `dart_fit_decoder` when you add FIT parsing.

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # Image handling
  image_picker: ^1.0.7
  video_player: ^2.9.2

  # Files
  file_picker: ^10.0.0

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  table_calendar: ^3.1.2
  http_parser: ^4.1.2
  fl_chart: ^0.65.0

  freezed_annotation: ^2.4.4
  gpx: ^2.3.0
  fit_parser: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logos/
